name: Build Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Grant Gradle wrapper execute permission
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          VERSION="${{ github.ref_name }}"
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/pocketdex-ai-${VERSION}.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocketdex-ai-${{ github.ref_name }}
          path: android/app/build/outputs/apk/release/pocketdex-ai-*.apk
          retention-days: 90

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: android/app/build/outputs/apk/release/pocketdex-ai-*.apk
